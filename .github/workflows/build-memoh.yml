name: Build Memoh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [main]

concurrency:
  group: build-memoh
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_OWNER: lakr233
  UPSTREAM_REPO: memohai/Memoh
  UPSTREAM_BRANCH: main
  BUN_VERSION: 1.3.11

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.resolve.outputs.upstream_sha }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream commit
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            upstream_sha="$(./scripts/fetch_upstream_sha.sh "${UPSTREAM_REPO}" "${UPSTREAM_BRANCH}")"
            short_sha="${upstream_sha:0:7}"
            echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
            echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          upstream_sha="$(./scripts/fetch_upstream_sha.sh "${UPSTREAM_REPO}" "${UPSTREAM_BRANCH}")"
          short_sha="${upstream_sha:0:7}"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          should_build=false
          for image in server web browser sparse; do
            sha_ref="ghcr.io/${IMAGE_OWNER}/memoh-${image}:sha-${short_sha}"
            main_ref="ghcr.io/${IMAGE_OWNER}/memoh-${image}:main"
            if ! docker buildx imagetools inspect "${sha_ref}" >/dev/null 2>&1; then
              should_build=true
              break
            fi
            if ! docker buildx imagetools inspect "${main_ref}" >/dev/null 2>&1; then
              should_build=true
              break
            fi
            sha_raw="$(docker buildx imagetools inspect --raw "${sha_ref}" | jq -cS .)"
            main_raw="$(docker buildx imagetools inspect --raw "${main_ref}" | jq -cS .)"
            if [ "${sha_raw}" != "${main_raw}" ]; then
              should_build=true
              break
            fi
          done
          echo "should_build=${should_build}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            dockerfile: docker/Dockerfile.server
          - image: web
            dockerfile: docker/Dockerfile.web
          - image: browser
            dockerfile: docker/Dockerfile.browser
          - image: sparse
            dockerfile: docker/Dockerfile.sparse
    steps:
      - name: Checkout upstream Memoh
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.resolve.outputs.upstream_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch browser Dockerfile for baseline Bun on amd64
        if: matrix.image == 'browser'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docker/Dockerfile.browser")
          original = path.read_text()
          needle = """RUN apt-get update && apt-get install -y unzip curl && \\
              curl -fsSL https://bun.sh/install | bash && \\
              ln -s /root/.bun/bin/bun /usr/local/bin/bun && \\
              apt-get clean && rm -rf /var/lib/apt/lists/*"""
          replacement = """ARG TARGETARCH
          ARG BUN_VERSION=1.3.11
          RUN apt-get update && apt-get install -y unzip curl && \\
              case "$TARGETARCH" in \\
                amd64) bun_arch="x64-baseline" ;; \\
                arm64) bun_arch="aarch64" ;; \\
                *) echo "Unsupported TARGETARCH: $TARGETARCH" >&2; exit 1 ;; \\
              esac && \\
              curl -fsSL -o /tmp/bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-${bun_arch}.zip" && \\
              unzip -p /tmp/bun.zip "bun-linux-${bun_arch}/bun" > /usr/local/bin/bun && \\
              chmod +x /usr/local/bin/bun && \\
              mkdir -p /root/.bun/bin && \\
              ln -sf /usr/local/bin/bun /root/.bun/bin/bun && \\
              ln -sf /usr/local/bin/bun /root/.bun/bin/bunx && \\
              rm -f /tmp/bun.zip && \\
              apt-get clean && rm -rf /var/lib/apt/lists/*"""

          if needle not in original:
            raise SystemExit("Expected browser Bun install block not found")

          path.write_text(original.replace(needle, replacement))
          PY

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/memoh-${{ matrix.image }}:main
            ghcr.io/${{ env.IMAGE_OWNER }}/memoh-${{ matrix.image }}:sha-${{ needs.resolve.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.resolve.outputs.upstream_sha }}
            org.opencontainers.image.title=memoh-${{ matrix.image }}
            io.memoh.upstream-source=https://github.com/${{ env.UPSTREAM_REPO }}
            io.memoh.build-repo-revision=${{ github.sha }}
            io.memoh.browser-bun-version=${{ env.BUN_VERSION }}
          build-args: |
            VERSION=${{ needs.resolve.outputs.short_sha }}
            COMMIT_HASH=${{ needs.resolve.outputs.upstream_sha }}
            VITE_API_URL=/api
            VITE_AGENT_URL=/agent
            BUN_VERSION=${{ env.BUN_VERSION }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  summarize:
    runs-on: ubuntu-latest
    needs: [resolve, build]
    if: always() && needs.resolve.outputs.should_build == 'true' && needs.build.result == 'success'
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect digests
        run: |
          ./scripts/collect_digests.sh "${IMAGE_OWNER}" "${{ needs.resolve.outputs.short_sha }}" digests
          cat digests/digests.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: memoh-digests-${{ needs.resolve.outputs.short_sha }}
          path: digests/

  noop:
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.should_build != 'true'
    steps:
      - name: Already built
        run: |
          echo "Upstream commit ${{ needs.resolve.outputs.upstream_sha }} already has published images." >> "$GITHUB_STEP_SUMMARY"
